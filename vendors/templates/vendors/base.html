<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Painel do Vendedor{% endblock %}</title>

    <!-- Bootstrap (ou o que você já usa) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Painel do Vendedor</span>

        <div>
            <a href="{% url 'vendors:vendor_dashboard' %}" class="btn btn-outline-light btn-sm">Dashboard</a>
            <a href="{% url 'logout' %}" class="btn btn-outline-danger btn-sm">Sair</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
